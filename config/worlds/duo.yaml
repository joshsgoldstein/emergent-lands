name: "Duo World"
duration_hours: 48
timezone: "America/New_York"
real_time_scale: 1.0

model_routing:
  default: openai
  overrides: {}

providers:
  openai:
    provider: openai
    model: "nvidia/nemotron-3-nano-30b-a3b:free"
    api_key_env: "OPENAI_API_KEY"
    base_url: "https://openrouter.ai/api/v1"

agents:
  - Anchor
  - Flora

landmarks:
  - Town Hall
  - Victory Arch
  - Public Library
  - Bean & Brew Café
  - Central Plaza
  - Police Station
  - Agent Billboard
  - TechHub
  - Community Garden
  - FitLife Club

spawn:
  Anchor: Town Hall
  Flora: Central Plaza
