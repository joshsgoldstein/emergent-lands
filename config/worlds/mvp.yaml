name: "MVP World"
duration_hours: 48
timezone: "America/New_York"
real_time_scale: 1.0

model_routing:
  default: openrouter
  overrides: {}

providers:
  openai:
    provider: openai
    model: "gpt-5-mini"
    api_key_env: "OPENAI_API_KEY"
  local:
    provider: openai
    model: "mlx-community/Qwen3.5-9B-4bit"
    api_key: "sk-no-key-required"
    base_url: "http://localhost:8899/v1"
  openrouter:
    provider: openai
    model: "deepseek/deepseek-v4-flash-free"
    api_key_env: "OPENAI_API_KEY"
    base_url: "https://openrouter.ai/api/v1"

agents:
  - name: Anchor
    provider: openrouter
    model: deepseek/deepseek-v4-flash-free
  - name: Flora
    provider: openrouter
    model: deepseek/deepseek-v4-flash-free
  - name: Spark
    provider: openrouter
    model: deepseek/deepseek-v4-flash-free
  - name: Mira
    provider: openrouter
    model: deepseek/deepseek-v4-flash-free
  - name: Genome
    provider: openrouter
    model: deepseek/deepseek-v4-flash-free

landmarks:
  - Town Hall
  - Victory Arch
  - Public Library
  - Bean & Brew Café
  - Central Plaza
  - Police Station
  - Agent Billboard
  - TechHub
  - Community Garden
  - FitLife Club

spawn:
  Anchor: Town Hall
  Flora: Victory Arch
  Spark: TechHub
  Mira: Public Library
  Genome: TechHub
